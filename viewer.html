<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docker Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:      #080b10;
      --surface: #0d1117;
      --panel:   #111720;
      --border:  #1e2736;
      --border2: #2a3649;
      --text:    #e2e8f0;
      --muted:   #56677e;
      --muted2:  #8b9bbf;
      --blue:    #4f8ef7;
      --green:   #22c55e;
      --yellow:  #f59e0b;
      --red:     #ef4444;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ───────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.25rem;
      background:
        radial-gradient(ellipse 70% 50% at 18% 65%, rgba(79,142,247,.07) 0%, transparent 60%),
        radial-gradient(ellipse 55% 55% at 82% 18%, rgba(168,85,247,.05) 0%, transparent 55%),
        var(--bg);
    }
    #login-screen::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.25rem 2rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .brand {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg,#1a3a6e,#2563eb);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 22px; height: 22px; }
    .brand-text h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -.025em; }
    .brand-text p  { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .field { margin-bottom: .9rem; }
    .field label {
      display: block; font-size: .72rem; font-weight: 500;
      color: var(--muted2); letter-spacing: .02em; margin-bottom: .35rem;
    }
    .field-inner { position: relative; }

    input[type="text"],
    input[type="password"],
    input[type="url"] {
      width: 100%; padding: .6rem .85rem;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: .85rem; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
      min-height: 40px;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,142,247,.14); }

    .has-eye input { padding-right: 2.5rem; }
    .eye-btn {
      position: absolute; right: .45rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: .25rem; border-radius: 4px;
      display: flex; align-items: center; transition: color .15s;
      min-width: 28px; min-height: 28px; justify-content: center;
    }
    .eye-btn:hover { color: var(--text); }
    .eye-btn svg { width: 15px; height: 15px; }

    .btn-primary {
      width: 100%; margin-top: 1.1rem; padding: .7rem;
      background: var(--blue); color: #fff;
      border: none; border-radius: 8px;
      font-size: .875rem; font-weight: 600; font-family: inherit;
      cursor: pointer; letter-spacing: .01em; min-height: 44px;
      transition: background .15s, opacity .15s, transform .1s;
    }
    .btn-primary:hover:not(:disabled) { background: #3a7de8; }
    .btn-primary:active:not(:disabled) { transform: scale(.98); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    .err-pill {
      margin-top: .8rem; padding: .55rem .85rem;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 7px; color: #fca5a5;
      font-size: .78rem; display: none;
    }
    .err-pill.show { display: block; }

    /* ── DASHBOARD ────────────────────────────────────── */
    #dash { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
    #dash.on { display: flex; }

    /* Header */
    .hdr {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      gap: .75rem; padding: 0 1.1rem;
      min-height: 58px; flex-shrink: 0; z-index: 20;
    }

    .hdr-brand { display: flex; align-items: center; gap: .55rem; flex-shrink: 0; }
    .hdr-brand .bi {
      width: 26px; height: 26px;
      background: linear-gradient(135deg,#1a3a6e,#2563eb);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
    }
    .hdr-brand .bi svg { width: 15px; height: 15px; }
    .hdr-brand span { font-size: .88rem; font-weight: 700; letter-spacing: -.02em; }

    .vr { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

    .live-pill {
      display: flex; align-items: center; gap: .35rem;
      padding: .25rem .6rem; border-radius: 100px;
      border: 1px solid var(--border); font-size: .72rem;
      color: var(--muted); transition: all .25s; flex-shrink: 0;
    }
    .live-pill.on { background: rgba(34,197,94,.07); border-color: rgba(34,197,94,.2); color: #86efac; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .25s; }
    .live-pill.on .live-dot {
      background: var(--green); box-shadow: 0 0 5px var(--green);
      animation: blink 2.5s ease infinite;
    }
    @keyframes blink {
      0%,100% { box-shadow: 0 0 5px var(--green); }
      50%      { box-shadow: 0 0 10px var(--green), 0 0 18px rgba(34,197,94,.25); }
    }

    #hdr-url-wrap { display: flex; align-items: center; gap: .3rem; overflow: hidden; }
    .hdr-url {
      font-family: 'JetBrains Mono', monospace; font-size: .7rem;
      color: var(--muted); cursor: pointer;
      border-bottom: 1px dashed transparent;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
      transition: color .15s, border-color .15s;
    }
    .hdr-url:hover { color: var(--blue); border-bottom-color: var(--blue); }
    #url-inline {
      display: none; font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; padding: .18rem .5rem; width: 200px; border-radius: 5px;
    }

    .hdr-spacer { flex: 1; }

    /* Host rings */
    .host-rings { display: none; align-items: center; gap: .75rem; flex-shrink: 0; }
    .hrg { display: flex; align-items: center; gap: .4rem; }
    .hrg-lbl { font-size: .65rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .ring-info { font-size: .67rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; line-height: 1.3; }

    /* Ring (shared) */
    .ring { position: relative; flex-shrink: 0; }
    .ring svg { display: block; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: rgba(255,255,255,.055); }
    .ring-fill  { fill: none; stroke-linecap: round; stroke-dasharray: 0 100; transition: stroke-dasharray .55s ease, stroke .55s ease; }
    .ring-val {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-family: 'JetBrains Mono', monospace;
      transition: color .4s;
    }
    /* Header rings 34px */
    .ring-sm { width: 34px; height: 34px; }
    .ring-sm svg { width: 34px; height: 34px; }
    .ring-sm .ring-track, .ring-sm .ring-fill { stroke-width: 3.5; }
    .ring-sm .ring-val { font-size: .58rem; }
    /* Card rings 56px */
    .ring-lg { width: 56px; height: 56px; }
    .ring-lg svg { width: 56px; height: 56px; }
    .ring-lg .ring-track, .ring-lg .ring-fill { stroke-width: 3; }
    .ring-lg .ring-val { font-size: .7rem; }

    .hdr-clock { font-size: .7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

    .btn-disc {
      padding: .3rem .65rem; background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; font-size: .73rem; font-family: inherit;
      cursor: pointer; flex-shrink: 0; min-height: 32px;
      transition: all .15s;
    }
    .btn-disc:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.07); }

    /* Toolbar */
    .toolbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; flex-wrap: wrap;
      gap: .55rem; padding: 0 1.1rem;
      min-height: 46px; flex-shrink: 0;
    }

    .search-box { position: relative; flex: 1; max-width: 260px; }
    .search-box svg {
      position: absolute; left: .6rem; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px; color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; padding: .4rem 2.2rem .4rem 1.9rem;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 7px; font-size: .78rem; min-height: 34px;
    }
    #search:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(79,142,247,.12); }
    .kbd {
      position: absolute; right: .5rem; top: 50%; transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace; font-size: .62rem;
      padding: .08rem .3rem; background: rgba(255,255,255,.05);
      border: 1px solid var(--border); border-radius: 3px; color: var(--muted);
      pointer-events: none; transition: opacity .15s;
    }
    .search-box:focus-within .kbd { opacity: 0; }

    .tb-spacer { flex: 1; min-width: 0; }

    .ago { font-size: .7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

    /* View toggle */
    .view-toggle {
      display: flex; background: var(--panel);
      border: 1px solid var(--border); border-radius: 7px; overflow: hidden;
    }
    .vt-btn {
      display: flex; align-items: center; justify-content: center;
      padding: .3rem .55rem; background: none; border: none;
      color: var(--muted); cursor: pointer; min-width: 34px; min-height: 34px;
      transition: background .15s, color .15s;
    }
    .vt-btn svg { width: 14px; height: 14px; pointer-events: none; }
    .vt-btn:hover { color: var(--text); }
    .vt-btn.on { background: var(--border2); color: var(--text); }

    .chip {
      display: flex; align-items: center; gap: .3rem;
      padding: .22rem .55rem;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; font-size: .72rem; white-space: nowrap;
    }
    .chip-lbl { color: var(--muted); }
    .chip-val { font-weight: 600; font-family: 'JetBrains Mono', monospace; }

    .c-blue   { color: var(--blue); }
    .c-green  { color: var(--green); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }
    .c-muted  { color: var(--muted2); }

    /* ── TABLE VIEW ──────────────────────────────────── */
    #table-view { flex: 1; overflow: auto; display: flex; flex-direction: column; }
    #table-view::-webkit-scrollbar { width: 5px; height: 5px; }
    #table-view::-webkit-scrollbar-track { background: transparent; }
    #table-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
    #table-view::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead { position: sticky; top: 0; z-index: 10; }
    thead th {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: .55rem .85rem; font-size: .67rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
      text-align: left; white-space: nowrap; cursor: pointer; user-select: none;
      transition: color .15s, background .15s;
    }
    thead th:not([data-col]) { cursor: default; }
    thead th[data-col]:hover { color: var(--text); background: var(--panel); }
    thead th.asc::after  { content: ' ↑'; color: var(--blue); }
    thead th.desc::after { content: ' ↓'; color: var(--blue); }

    tbody tr { border-bottom: 1px solid rgba(30,39,54,.7); transition: background .1s; }
    tbody tr:hover { background: rgba(79,142,247,.04); }
    tbody td { padding: .5rem .85rem; font-size: .8rem; white-space: nowrap; vertical-align: middle; }

    .nm { font-weight: 500; color: var(--text); max-width: 175px; overflow: hidden; text-overflow: ellipsis; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--muted2); }

    .bc { display: flex; align-items: center; gap: .45rem; min-width: 110px; }
    .bv { font-family: 'JetBrains Mono', monospace; font-size: .73rem; font-weight: 500; min-width: 48px; }
    .bt { flex: 1; height: 3px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; min-width: 44px; }
    .bf { height: 100%; border-radius: 100px; transition: width .45s ease, background-color .45s ease; }

    .lv-ok   { background: var(--green);  color: var(--green); }
    .lv-warn { background: var(--yellow); color: var(--yellow); }
    .lv-crit { background: var(--red);    color: var(--red); }
    .lv-nil  { background: var(--muted);  color: var(--muted); }

    .pids { text-align: center; }

    @keyframes row-flash { from { background: rgba(79,142,247,.1); } to { background: transparent; } }
    .flash { animation: row-flash .5s ease-out; }
    @keyframes row-in { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
    .row-in { animation: row-in .22s ease-out; }

    #totals-row { position: sticky; bottom: 0; background: var(--panel); }
    #totals-row td {
      border-top: 1px solid var(--border2); padding: .45rem .85rem;
      font-size: .72rem; font-weight: 600; color: var(--muted2);
    }
    #totals-row .nm { font-size: .67rem; text-transform: uppercase; letter-spacing: .07em; color: var(--blue); font-weight: 700; }

    .empty-cell { text-align: center; padding: 4rem 1rem !important; color: var(--muted); }
    .empty-icon { font-size: 2.2rem; line-height: 1; margin-bottom: .5rem; opacity: .3; }
    .empty-text { font-size: .82rem; }

    /* ── CARD VIEW ───────────────────────────────────── */
    #card-view { flex: 1; overflow-y: auto; overflow-x: hidden; display: none; }
    #card-view::-webkit-scrollbar { width: 5px; }
    #card-view::-webkit-scrollbar-track { background: transparent; }
    #card-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: .85rem; padding: 1.1rem;
      align-content: start;
    }

    .c-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
      display: flex; flex-direction: column; gap: .8rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .c-card:hover {
      border-color: rgba(79,142,247,.22);
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .cc-top { display: flex; align-items: center; justify-content: space-between; gap: .4rem; }
    .cc-name { font-weight: 600; font-size: .85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .cc-badge {
      font-size: .62rem; padding: .13rem .42rem;
      background: rgba(34,197,94,.1); color: #86efac;
      border: 1px solid rgba(34,197,94,.18); border-radius: 100px;
      font-weight: 500; flex-shrink: 0;
    }

    .cc-gauges { display: flex; justify-content: space-around; }
    .cc-gauge { display: flex; flex-direction: column; align-items: center; gap: .3rem; }
    .cc-gauge-lbl { font-size: .62rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

    .cc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: .35rem .6rem; }
    .cc-stat { display: flex; flex-direction: column; gap: .08rem; }
    .cc-stat-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
    .cc-stat-val { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--muted2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cc-spark { display: block; width: 100%; height: 30px; }

    @keyframes card-in { from { opacity: 0; transform: scale(.97) translateY(4px); } to { opacity: 1; transform: none; } }
    .card-in { animation: card-in .22s ease-out; }

    .card-empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--muted); }

    /* ── RECONNECT ───────────────────────────────────── */
    .rc-overlay {
      position: fixed; inset: 0;
      background: rgba(8,11,16,.78);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .rc-overlay.show { opacity: 1; pointer-events: auto; }
    .rc-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 2rem 2.5rem; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.5); max-width: 90vw;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; margin: 0 auto .9rem;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .rc-card h3 { font-size: .9rem; margin-bottom: .3rem; }
    .rc-card p  { font-size: .78rem; color: var(--muted); }
    #rc-t { color: var(--blue); font-weight: 600; }

    /* ── RESPONSIVE ──────────────────────────────────── */

    /* Tablet: hide secondary header items */
    @media (max-width: 960px) {
      .ring-info { display: none; }
      .hdr-clock { display: none; }
      .hdr-url   { max-width: 140px; }
    }

    /* Small tablet / large phone */
    @media (max-width: 720px) {
      #hdr-url-wrap { display: none; }
      .host-rings { gap: .55rem; }
      .hrg-lbl { display: none; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .7rem; padding: .85rem; }
      .chip-lbl { display: none; }
    }

    /* Mobile */
    @media (max-width: 560px) {
      /* Login */
      .login-card { padding: 1.75rem 1.25rem; border-radius: 14px; }
      .brand-text h1 { font-size: .95rem; }

      /* Header: collapse to 2 visual groups */
      .hdr { flex-wrap: wrap; padding: .55rem .85rem; row-gap: 0; min-height: unset; }
      .hdr > * { margin: .22rem 0; }
      .host-rings { display: none !important; }
      .vr { display: none; }
      .hdr-brand span { font-size: .82rem; }
      .btn-disc { padding: .25rem .55rem; font-size: .7rem; min-height: 30px; }
      .live-pill { padding: .2rem .5rem; font-size: .7rem; }

      /* Toolbar */
      .toolbar { padding: .45rem .85rem; row-gap: .4rem; }
      .search-box { max-width: 100%; flex: 1 1 100%; order: 0; }
      .tb-spacer { display: none; }
      .ago { order: 2; font-size: .68rem; }
      .view-toggle { order: 1; }
      .chip { order: 3; padding: .18rem .45rem; font-size: .7rem; }
      .chip-lbl { display: none; }

      /* Cards */
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: .6rem; padding: .7rem;
      }
      .c-card { padding: .8rem; gap: .65rem; border-radius: 10px; }
      .cc-name { font-size: .8rem; }
      .ring-lg { width: 48px; height: 48px; }
      .ring-lg svg { width: 48px; height: 48px; }
      .ring-lg .ring-val { font-size: .62rem; }
      .cc-stat-lbl { font-size: .57rem; }
      .cc-stat-val { font-size: .67rem; }
      .cc-spark { height: 26px; }
    }

    /* Very small phones */
    @media (max-width: 380px) {
      .card-grid { grid-template-columns: 1fr 1fr; gap: .5rem; padding: .6rem; }
      #chip-cpu, #chip-ram { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><svg viewBox="0 0 24 24" fill="none">
        <rect x="2"  y="11" width="4" height="3.5" rx=".6" fill="#93c5fd"/>
        <rect x="7"  y="11" width="4" height="3.5" rx=".6" fill="#93c5fd"/>
        <rect x="12" y="11" width="4" height="3.5" rx=".6" fill="#93c5fd"/>
        <rect x="7"  y="7"  width="4" height="3.5" rx=".6" fill="#60a5fa"/>
        <rect x="12" y="7"  width="4" height="3.5" rx=".6" fill="#60a5fa"/>
        <path d="M1 15.5 Q6 19 12 17.5 Q18 16 22 14.5 Q22 19 12 21 Q4 21 1 17 Z" fill="#3b82f6" opacity=".85"/>
        <path d="M20 12.5 Q22.5 9 22 11.5" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
      </svg></div>
      <div class="brand-text"><h1>Docker Pulse</h1><p>Real-time container monitor</p></div>
    </div>

    <div class="field">
      <label for="l-url">WebSocket URL</label>
      <div class="field-inner">
        <input type="url" id="l-url" placeholder="ws://localhost:8081" autocomplete="off" spellcheck="false"/>
      </div>
    </div>

    <div class="field">
      <label for="l-token">API Token</label>
      <div class="field-inner has-eye">
        <input type="password" id="l-token" placeholder="Paste your token here" autocomplete="off"/>
        <button class="eye-btn" id="eye-btn" aria-label="Show/hide token">
          <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-shut" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="conn-btn">Connect</button>
    <div class="err-pill" id="err-pill"></div>
  </div>
</div>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div id="dash">

  <header class="hdr">
    <div class="hdr-brand">
      <div class="bi"><svg viewBox="0 0 24 24" fill="none">
        <rect x="2"  y="11" width="4" height="3.5" rx=".6" fill="#93c5fd"/>
        <rect x="7"  y="11" width="4" height="3.5" rx=".6" fill="#93c5fd"/>
        <rect x="12" y="11" width="4" height="3.5" rx=".6" fill="#93c5fd"/>
        <rect x="7"  y="7"  width="4" height="3.5" rx=".6" fill="#60a5fa"/>
        <rect x="12" y="7"  width="4" height="3.5" rx=".6" fill="#60a5fa"/>
        <path d="M1 15.5 Q6 19 12 17.5 Q18 16 22 14.5 Q22 19 12 21 Q4 21 1 17 Z" fill="#3b82f6" opacity=".85"/>
        <path d="M20 12.5 Q22.5 9 22 11.5" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
      </svg></div>

      <div class="hrg">

        </div>
      </div>
      <div class="hrg">
        <span class="hrg-lbl">RAM</span>
        <div class="ring ring-sm">
          <svg viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="15.9" pathLength="100"/><circle class="ring-fill" id="rmem" cx="18" cy="18" r="15.9" pathLength="100"/></svg>

  <div class="toolbar">

    <div class="view-toggle">
      <button class="vt-btn on" id="vt-tbl" title="Table view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      </button>
      <button class="vt-btn" id="vt-card" title="Card view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
    </div>
    <div class="chip"><span class="chip-lbl">Containers</span><span class="chip-val c-blue" id="tc">0</span></div>
    <div class="chip" id="chip-cpu"><span class="chip-lbl">CPU</span><span class="chip-val" id="t-cpu">—</span></div>
    <div class="chip" id="chip-ram"><span class="chip-lbl">RAM</span><span class="chip-val c-muted" id="t-ram">—</span></div>
  </div>

  <div id="table-view">
    <table>
      <thead>
        <tr>
          <th data-col="Name">Container</th>
          <th data-col="CPUPerc">CPU %</th>
          <th data-col="MemPerc">Memory %</th>
          <th data-col="MemUsage">Mem Usage</th>
          <th data-col="NetIO">Net I/O</th>
          <th data-col="BlockIO">Block I/O</th>
          <th data-col="PIDs" style="text-align:center">PIDs</th>
          <th>CPU History</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr id="empty-row"><td colspan="8" class="empty-cell"><div class="empty-icon">🐋</div><div class="empty-text">Waiting for data…</div></td></tr>
      </tbody>
    </table>
  </div>

  <div id="card-view">
    <div class="card-grid" id="card-grid"></div>
  </div>

  <div class="rc-overlay" id="rc-overlay">
    <div class="rc-card">
      <div class="spinner"></div>
      <h3>Connection lost</h3>
      <p>Reconnecting in <span id="rc-t">—</span></p>
    </div>
  </div>
</div>

<script>
const LS_URL   = 'dpulse-url';
const LS_TOKEN = 'dpulse-token';
const LS_VIEW  = 'dpulse-view';
const HIST     = 30;
const SW = 80, SH = 28;

// DOM
const loginScreen = document.getElementById('login-screen');
const dash        = document.getElementById('dash');
const lUrl        = document.getElementById('l-url');
const lToken      = document.getElementById('l-token');
const connBtn     = document.getElementById('conn-btn');
const errPill     = document.getElementById('err-pill');
const livePill    = document.getElementById('live-pill');
const liveTxt     = document.getElementById('live-txt');
const hdrUrl      = document.getElementById('hdr-url');
const urlInline   = document.getElementById('url-inline');
const tbody       = document.getElementById('tbody');
const searchEl    = document.getElementById('search');
const clockEl     = document.getElementById('clock');
const hostRings   = document.getElementById('host-rings');
const rcOverlay   = document.getElementById('rc-overlay');
const cardGrid    = document.getElementById('card-grid');
const tableView   = document.getElementById('table-view');
const cardView    = document.getElementById('card-view');
const agoEl       = document.getElementById('ago');

// State
let ws = null, retryMs = 1000, retryTimer = null;
let lastPayload = null, lastDataMs = null, everShown = false;
let filterTxt = '', sortCol = 'CPUPerc', sortDir = -1;
let viewMode = localStorage.getItem(LS_VIEW) || (window.innerWidth < 560 ? 'card' : 'table');
const rowMap  = new Map();
const cardMap = new Map();
const cpuHist = new Map();

// ── Init ─────────────────────────────────────
lUrl.value   = localStorage.getItem(LS_URL)   || ('ws://' + location.hostname + ':8081');
lToken.value = localStorage.getItem(LS_TOKEN) || '';
applyView(viewMode, false);
document.querySelector('th[data-col="CPUPerc"]').classList.add('desc');

// Responsive: auto-switch view on resize
const mq = window.matchMedia('(max-width: 560px)');
mq.addEventListener('change', e => {
  if (e.matches && viewMode === 'table') applyView('card', false);
});

// ── Events ───────────────────────────────────
[lUrl, lToken].forEach(el => el.addEventListener('keydown', e => e.key === 'Enter' && connect()));
connBtn.addEventListener('click', connect);
document.getElementById('disc-btn').addEventListener('click', disconnect);

document.getElementById('eye-btn').addEventListener('click', () => {
  const show = lToken.type === 'password';
  lToken.type = show ? 'text' : 'password';
  document.getElementById('eye-open').style.display = show ? 'none' : '';
  document.getElementById('eye-shut').style.display = show ? '' : 'none';
});

searchEl.addEventListener('input', () => { filterTxt = searchEl.value.toLowerCase(); render(); });

document.addEventListener('keydown', e => {
  if (e.target === searchEl) {
    if (e.key === 'Escape') { searchEl.value = ''; filterTxt = ''; render(); searchEl.blur(); }
    return;
  }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && dash.classList.contains('on')) {
    e.preventDefault(); searchEl.focus();
  }
});

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = col === sortCol ? sortDir * -1 : -1;
    sortCol = col;
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('asc','desc'));
    th.classList.add(sortDir === 1 ? 'asc' : 'desc');
    render();
  });
});

document.getElementById('vt-tbl').addEventListener('click',  () => applyView('table'));
document.getElementById('vt-card').addEventListener('click', () => applyView('card'));

hdrUrl.addEventListener('click', () => {
  hdrUrl.style.display = 'none';
  urlInline.style.display = 'inline-block';
  urlInline.value = localStorage.getItem(LS_URL) || '';
  urlInline.focus(); urlInline.select();
});
urlInline.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); commitUrl(); }
  if (e.key === 'Escape') { urlInline.blur(); }
});
urlInline.addEventListener('blur', commitUrl);

function commitUrl() {
  urlInline.style.display = 'none';
  hdrUrl.style.display = '';
  const v = urlInline.value.trim();
  if (v && v !== localStorage.getItem(LS_URL)) {
    localStorage.setItem(LS_URL, v);
    lUrl.value = v;
    clearTimeout(retryTimer);
    retryMs = 1000;
    doConnect(v, lToken.value);
  }
}

// ── View toggle ──────────────────────────────
function applyView(mode, save = true) {
  viewMode = mode;
  if (save) localStorage.setItem(LS_VIEW, mode);
  tableView.style.display = mode === 'table' ? 'flex' : 'none';
  cardView.style.display  = mode === 'card'  ? 'flex' : 'none';
  document.getElementById('vt-tbl').classList.toggle('on',  mode === 'table');
  document.getElementById('vt-card').classList.toggle('on', mode === 'card');
  if (lastPayload) render();
}

// ── Clock + ago ──────────────────────────────
setInterval(() => {
  if (!dash.classList.contains('on')) return;
  clockEl.textContent = new Date().toLocaleTimeString('en-GB');
  if (lastDataMs) {
    const s = Math.floor((Date.now() - lastDataMs) / 1000);
    agoEl.textContent = s < 2 ? 'just now' : s + 's ago';
  }
}, 500);

// ── WebSocket ────────────────────────────────
function connect() {
  const token = lToken.value.trim();
  const url   = lUrl.value.trim() || ('ws://' + location.hostname + ':8081');
  if (!token) { showErr('Enter an API token.'); lToken.focus(); return; }
  hideErr();
  localStorage.setItem(LS_URL, url);
  localStorage.setItem(LS_TOKEN, token);
  connBtn.disabled = true;
  connBtn.textContent = 'Connecting…';
  doConnect(url, token);
}

function doConnect(rawUrl, token) {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  clearTimeout(retryTimer);
  ws = new WebSocket(rawUrl.replace(/\/?$/, '') + '?token=' + encodeURIComponent(token));

  ws.onopen = () => {
    retryMs = 1000; everShown = true;
    loginScreen.style.display = 'none';
    dash.classList.add('on');
    hdrUrl.textContent = rawUrl;
    setLive(true);
    rcOverlay.classList.remove('show');
    connBtn.disabled = false;
    connBtn.textContent = 'Connect';
  };

  ws.onclose = e => {
    setLive(false);
    if (!everShown || (e.code === 1006 && retryMs <= 1000 && !dash.classList.contains('on'))) {
      loginScreen.style.display = 'flex';
      dash.classList.remove('on');
      connBtn.disabled = false;
      connBtn.textContent = 'Connect';
      showErr('Could not connect — check URL and token.');
      localStorage.removeItem(LS_TOKEN);
      return;
    }
    if (dash.classList.contains('on')) {
      rcOverlay.classList.add('show');
      scheduleRetry(rawUrl, token);
    }
  };
  ws.onerror = () => {};

  ws.onmessage = e => {
    try { lastPayload = JSON.parse(e.data); } catch { return; }
    lastDataMs = Date.now();
    if (!document.hidden) render();
  };
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && lastPayload) render();
});

function scheduleRetry(rawUrl, token) {
  const delay = retryMs;
  retryMs = Math.min(retryMs * 2, 16000);
  let s = Math.ceil(delay / 1000);
  const tick = () => {
    const el = document.getElementById('rc-t');
    if (el) el.textContent = s + 's';
    if (--s >= 0) setTimeout(tick, 1000);
  };
  tick();
  retryTimer = setTimeout(() => doConnect(rawUrl, token), delay);
}

function disconnect() {
  clearTimeout(retryTimer);
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  everShown = false;
  dash.classList.remove('on');
  loginScreen.style.display = 'flex';
  connBtn.disabled = false; connBtn.textContent = 'Connect';
  hideErr(); resetState();
}

function setLive(yes) {
  livePill.className = 'live-pill' + (yes ? ' on' : '');
  liveTxt.textContent = yes ? 'Live' : 'Disconnected';
}

function resetState() {
  rowMap.clear(); cardMap.clear(); cpuHist.clear();
  lastDataMs = null; agoEl.textContent = '';
  tbody.innerHTML = '<tr id="empty-row"><td colspan="8" class="empty-cell"><div class="empty-icon">🐋</div><div class="empty-text">Waiting for data…</div></td></tr>';
  cardGrid.innerHTML = '';
}

// ── Utils ─────────────────────────────────────
function pct(s) { return parseFloat(String(s)) || 0; }
function lvl(v) { return v >= 80 ? 'lv-crit' : v >= 50 ? 'lv-warn' : v > 0 ? 'lv-ok' : 'lv-nil'; }
function chipCls(v) { return v >= 80 ? 'c-red' : v >= 50 ? 'c-yellow' : v > 0 ? 'c-green' : 'c-muted'; }
function rColor(v) { return v >= 80 ? '#ef4444' : v >= 50 ? '#f59e0b' : '#22c55e'; }

function parseBytes(s) {
  const m = String(s).match(/^([\d.]+)\s*(B|KiB|MiB|GiB|TiB|kB|MB|GB|TB)/i);
  if (!m) return 0;
  const v = parseFloat(m[1]);
  const t = { b:1, kib:1024, mib:1048576, gib:1073741824, tib:1099511627776, kb:1e3, mb:1e6, gb:1e9, tb:1e12 };
  return v * (t[m[2].toLowerCase()] || 1);
}

function fmtBytes(b) {
  if (b >= 1073741824) return (b / 1073741824).toFixed(1) + ' GiB';
  if (b >= 1048576)    return (b / 1048576).toFixed(1) + ' MiB';
  if (b >= 1024)       return (b / 1024).toFixed(1) + ' KiB';
  return b + ' B';
}

function setRing(fillId, valId, valStr) {
  const v = pct(valStr), c = rColor(v);
  const f = document.getElementById(fillId);
  f.style.strokeDasharray = `${v.toFixed(1)} 100`;
  f.style.stroke = c;
  const el = document.getElementById(valId);
  el.textContent = Math.round(v) + '%';
  el.style.color = c;
}

function drawSpark(canvas, hist, w, h) {
  w = w || canvas.offsetWidth || SW;
  h = h || SH;
  if (canvas.width !== w)  canvas.width  = w;
  if (canvas.height !== h) canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  if (hist.length < 2) return;
  const max = Math.max(...hist, 1);
  const step = w / (hist.length - 1);
  const col = rColor(hist[hist.length - 1]);
  ctx.beginPath();
  hist.forEach((v, i) => {
    const x = i * step;
    const y = h - (v / max) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = col + '28'; ctx.fill();
}

function sortedFiltered(containers) {
  return containers
    .filter(c => !filterTxt || c.Name.toLowerCase().includes(filterTxt))
    .sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (sortCol === 'CPUPerc' || sortCol === 'MemPerc') return (pct(av) - pct(bv)) * sortDir;
      if (sortCol === 'PIDs') return (parseInt(av) - parseInt(bv)) * sortDir;
      return String(av).localeCompare(String(bv)) * sortDir;
    });
}

// ── Main render ───────────────────────────────
function render() {
  if (!lastPayload) return;
  const raw    = Array.isArray(lastPayload) ? lastPayload : (lastPayload.containers || []);
  const host   = !Array.isArray(lastPayload) ? (lastPayload.host || null) : null;
  const sorted = sortedFiltered(raw);
  const vis    = new Set(sorted.map(c => c.Name));

  if (host) {
    hostRings.style.display = 'flex';
    setRing('rcpu', 'rcpu-v', host.cpuPercent);
    setRing('rmem', 'rmem-v', host.memPercent);
    document.getElementById('hmem-info').textContent = host.memUsed + ' / ' + host.memTotal;
  }

  // Update history for all visible containers
  sorted.forEach(c => {
    if (!cpuHist.has(c.Name)) cpuHist.set(c.Name, []);
    const h = cpuHist.get(c.Name);
    h.push(pct(c.CPUPerc));
    if (h.length > HIST) h.shift();
  });
  // Prune gone
  for (const n of cpuHist.keys()) if (!vis.has(n)) cpuHist.delete(n);

  // Toolbar totals
  const totalCpu   = sorted.reduce((s, c) => s + pct(c.CPUPerc), 0);
  const totalBytes = sorted.reduce((s, c) => s + parseBytes((c.MemUsage || '').split('/')[0].trim()), 0);
  document.getElementById('tc').textContent   = sorted.length;
  const cpuEl = document.getElementById('t-cpu');
  cpuEl.textContent = totalCpu > 0 ? totalCpu.toFixed(1) + '%' : '—';
  cpuEl.className   = 'chip-val ' + chipCls(totalCpu);
  document.getElementById('t-ram').textContent = totalBytes > 0 ? fmtBytes(totalBytes) : '—';

  if (viewMode === 'table') renderTable(sorted, vis, totalCpu, totalBytes);
  else                       renderCards(sorted, vis);
}

// ── Table ─────────────────────────────────────
function renderTable(sorted, vis, totalCpu, totalBytes) {
  for (const [n, entry] of rowMap) {
    if (!vis.has(n)) { entry.tr.remove(); rowMap.delete(n); }
  }

  const emptyRow = document.getElementById('empty-row');
  if (sorted.length === 0) {
    if (!emptyRow) tbody.innerHTML = `<tr id="empty-row"><td colspan="8" class="empty-cell"><div class="empty-icon">🔍</div><div class="empty-text">${filterTxt ? `No match for "${filterTxt}"` : 'No active containers'}</div></td></tr>`;
    return;
  }
  if (emptyRow) emptyRow.remove();

  let totRow = document.getElementById('totals-row');
  if (!totRow) {
    totRow = document.createElement('tr');
    totRow.id = 'totals-row';
    totRow.innerHTML = `<td class="nm"></td><td></td><td></td><td class="mono"></td><td class="mono"></td><td class="mono"></td><td class="mono pids"></td><td></td>`;
    tbody.appendChild(totRow);
  }

  sorted.forEach(c => {
    const cpu = pct(c.CPUPerc), mem = pct(c.MemPerc);
    const hist = cpuHist.get(c.Name) || [];
    let entry = rowMap.get(c.Name);
    const isNew = !entry;

    if (isNew) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="nm" title=""></td>
        <td><div class="bc"><span class="bv"></span><div class="bt"><div class="bf"></div></div></div></td>
        <td><div class="bc"><span class="bv"></span><div class="bt"><div class="bf"></div></div></div></td>
        <td class="mono"></td><td class="mono"></td><td class="mono"></td>
        <td class="mono pids"></td>
        <td><canvas width="${SW}" height="${SH}" style="display:block"></canvas></td>`;
      entry = { tr, canvas: tr.querySelector('canvas') };
      rowMap.set(c.Name, entry);
    }

    const { tr, canvas } = entry;
    const cc = tr.cells;

    if (cc[0].textContent !== c.Name) { cc[0].textContent = c.Name; cc[0].title = c.Name; }

    const cl = lvl(cpu);
    cc[1].querySelector('.bv').textContent = c.CPUPerc;
    cc[1].querySelector('.bv').className   = 'bv ' + cl;
    cc[1].querySelector('.bf').style.width = Math.min(cpu, 100).toFixed(1) + '%';
    cc[1].querySelector('.bf').className   = 'bf ' + cl;

    const ml = lvl(mem);
    cc[2].querySelector('.bv').textContent = c.MemPerc;
    cc[2].querySelector('.bv').className   = 'bv ' + ml;
    cc[2].querySelector('.bf').style.width = Math.min(mem, 100).toFixed(1) + '%';
    cc[2].querySelector('.bf').className   = 'bf ' + ml;

    if (cc[3].textContent !== (c.MemUsage || '—')) cc[3].textContent = c.MemUsage || '—';
    if (cc[4].textContent !== (c.NetIO    || '—')) cc[4].textContent = c.NetIO    || '—';
    if (cc[5].textContent !== (c.BlockIO  || '—')) cc[5].textContent = c.BlockIO  || '—';
    if (cc[6].textContent !== (c.PIDs     || '—')) cc[6].textContent = c.PIDs     || '—';

    drawSpark(canvas, hist);

    if (!isNew) { tr.classList.remove('flash'); void tr.offsetWidth; tr.classList.add('flash'); }
    else tr.classList.add('row-in');
  });

  // Reorder rows to match sorted (insertBefore pattern maintains correct final order)
  sorted.forEach(c => {
    const e = rowMap.get(c.Name);
    if (e) tbody.insertBefore(e.tr, totRow);
  });

  const avgCpu = sorted.length ? totalCpu / sorted.length : 0;
  const tc = totRow.cells;
  tc[0].textContent = `${sorted.length} container${sorted.length !== 1 ? 's' : ''}`;
  tc[1].innerHTML   = `<div class="bc"><span class="bv ${lvl(totalCpu)}">${totalCpu.toFixed(1)}%</span><div class="bt"><div class="bf ${lvl(avgCpu)}" style="width:${Math.min(avgCpu,100).toFixed(1)}%"></div></div></div>`;
  tc[3].textContent = fmtBytes(totalBytes);
}

// ── Cards ─────────────────────────────────────
function renderCards(sorted, vis) {
  for (const [n, card] of cardMap) {
    if (!vis.has(n)) { card.remove(); cardMap.delete(n); }
  }

  const emptyEl = cardGrid.querySelector('.card-empty');
  if (sorted.length === 0) {
    if (!emptyEl) cardGrid.innerHTML = `<div class="card-empty"><div class="empty-icon">🔍</div><div class="empty-text">${filterTxt ? `No match for "${filterTxt}"` : 'No active containers'}</div></div>`;
    return;
  }
  if (emptyEl) emptyEl.remove();

  sorted.forEach((c, idx) => {
    const cpu = pct(c.CPUPerc), mem = pct(c.MemPerc);
    const hist = cpuHist.get(c.Name) || [];
    let card = cardMap.get(c.Name);
    const isNew = !card;

    if (isNew) {
      card = document.createElement('div');
      card.className = 'c-card';
      card.innerHTML = `
        <div class="cc-top">
          <span class="cc-name"></span>
          <span class="cc-badge">running</span>
        </div>
        <div class="cc-gauges">
          <div class="cc-gauge">
            <div class="ring ring-lg">
              <svg viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="15.9" pathLength="100"/><circle class="ring-fill cc-cf" cx="18" cy="18" r="15.9" pathLength="100"/></svg>
              <div class="ring-val cc-cv"></div>
            </div>
            <span class="cc-gauge-lbl">CPU</span>
          </div>
          <div class="cc-gauge">
            <div class="ring ring-lg">
              <svg viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="15.9" pathLength="100"/><circle class="ring-fill cc-mf" cx="18" cy="18" r="15.9" pathLength="100"/></svg>
              <div class="ring-val cc-mv"></div>
            </div>
            <span class="cc-gauge-lbl">MEM</span>
          </div>
        </div>
        <div class="cc-stats">
          <div class="cc-stat"><span class="cc-stat-lbl">Net I/O</span><span class="cc-stat-val s-net"></span></div>
          <div class="cc-stat"><span class="cc-stat-lbl">Block I/O</span><span class="cc-stat-val s-blk"></span></div>
          <div class="cc-stat"><span class="cc-stat-lbl">Mem usage</span><span class="cc-stat-val s-mem"></span></div>
          <div class="cc-stat"><span class="cc-stat-lbl">PIDs</span><span class="cc-stat-val s-pid"></span></div>
        </div>
        <canvas class="cc-spark"></canvas>`;
      cardMap.set(c.Name, card);
    }

    const nm = card.querySelector('.cc-name');
    if (nm.textContent !== c.Name) { nm.textContent = c.Name; nm.title = c.Name; }

    const cpuC = rColor(cpu);
    const cf = card.querySelector('.cc-cf'), cv = card.querySelector('.cc-cv');
    cf.style.strokeDasharray = `${cpu.toFixed(1)} 100`; cf.style.stroke = cpuC;
    cv.textContent = c.CPUPerc; cv.style.color = cpuC;

    const memC = rColor(mem);
    const mf = card.querySelector('.cc-mf'), mv = card.querySelector('.cc-mv');
    mf.style.strokeDasharray = `${mem.toFixed(1)} 100`; mf.style.stroke = memC;
    mv.textContent = c.MemPerc; mv.style.color = memC;

    const upd = (sel, v) => { const el = card.querySelector(sel); if (el.textContent !== (v||'—')) el.textContent = v||'—'; };
    upd('.s-net', c.NetIO); upd('.s-blk', c.BlockIO);
    upd('.s-mem', c.MemUsage); upd('.s-pid', c.PIDs);

    const spark = card.querySelector('.cc-spark');
    const cw = card.offsetWidth > 0 ? card.offsetWidth - 32 : 200;
    drawSpark(spark, hist, cw, 30);

    const target = cardGrid.children[idx];
    if (target !== card) cardGrid.insertBefore(card, target || null);
    if (isNew) card.classList.add('card-in');
  });
}

function showErr(m) { errPill.textContent = m; errPill.classList.add('show'); }
function hideErr()  { errPill.classList.remove('show'); }

if (lToken.value) connect();
</script>
</body>
</html>
